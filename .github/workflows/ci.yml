name: CI/CD for Detox 30 Bot Refactored

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black mypy pylint  # dev tools
    
    - name: Lint with black
      run: black --check src/
    
    - name: Type check with mypy (relaxed)
      run: mypy src/ --ignore-missing-imports --no-error-summary || true
    
    - name: Syntax check all Python files
      run: |
        python -m py_compile src/**/*.py
        echo "✅ All files compile successfully"
    
    - name: Run basic import test
      run: |
        PYTHONPATH=src python -c "
        from config.settings import settings
        from bot import BOT_VERSION
        print(f'✅ Bot version: {BOT_VERSION}')
        print('✅ Imports successful')
        "

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: detox30-bot:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
