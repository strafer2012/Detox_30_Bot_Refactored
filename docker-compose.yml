version: '3.8'

services:
  bot:
    build: .
    container_name: detox30-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./detox30.db:/app/detox30.db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"