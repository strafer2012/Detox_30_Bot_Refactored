version: '3.8'

services:
  bot:
    build: .
    container_name: detox30-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"  # Health check endpoint
    volumes:
      - ./logs:/app/logs
      - ./detox30.db:/app/detox30.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s